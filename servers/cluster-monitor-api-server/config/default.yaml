server:
  port: 16000
  portOffset: 0
  unixDomainSocket: ""
  pidFile: ""
  bodySizeLimit: 1gb
# middleware
dbSettings:
  database:
    hosts:
      - host: database
        port: 3306
    database: akashic
    user: akashic
    password: pw
    pool: true
    poolConnectionLimit: 40
dispatchingRedis:
  host: redis
  port: 6379
  option:
    password: ""
zookeeper:
  hosts:
    - host: zookeeper
      port: 2181
  option:
    timeout: 30000
    host_order_deterministic: false
    debug_level: 1
# application config
logger:
  appenders:
    access:
      type: console
      layout:
        type: basic
    out:
      type: console
      layout:
        type: basic
    error:
      type: console
      layout:
        type: basic
  categories:
    default:
      appenders:
        - out
      level: info
    access:
      appenders:
        - access
      level: info
    out:
      appenders:
        - out
      level: info
    error:
      appenders:
        - error
      level: info
