name: release-image
on:
  push:
    branches: ["main"]

env:
  IMAGE_NAME: ghcr.io/akashic-games/akashic-system

permissions:
  contents: read
  packages: write

jobs:
  build-image-and-push:
    strategy:
      matrix:
        include:
          - platform: "arm"
            runs-on: ubuntu-24.04-arm
          - platform: "amd"
            runs-on: ubuntu-latest
    runs-on: ${{ matrix.runs-on }}

    steps:
      - name: checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: setup docker buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # 3.12.0

      - name: login docker registry
        uses: docker/login-action@343f7c4344506bcbf9b4de18042ae17996df046d # 3.0.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: build image and push
        run: |
          bash ./build.sh \
            ${{ matrix.platform }} \
            --push \
            -t "${{ env.IMAGE_NAME }}:latest-${{ matrix.platform }}"

  create-manifest:
    needs: build-image-and-push
    runs-on: ubuntu-latest
    steps:
      - name: login docker registry
        uses: docker/login-action@343f7c4344506bcbf9b4de18042ae17996df046d # 3.0.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: setup docker buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # 3.12.0

      - name: create manifest for the latest
        run: |
          docker buildx imagetools create \
            -t ${{ env.IMAGE_NAME }}:latest \
            ${{ env.IMAGE_NAME }}:latest-arm \
            ${{ env.IMAGE_NAME }}:latest-amd
