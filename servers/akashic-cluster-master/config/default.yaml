server:
  port: 13400
  portOffset: 0
# middleware
dbSettings:
  database:
    hosts:
      - host: database
        port: 3306
    database: akashic
    user: akashic
    password: pw
    pool: true
    poolConnectionLimit: 40
redis:
  host: redis
  port: 6379
  option:
    password: ""
rabbitmq:
  url:
    - amqp://rabbitmq
  user: guest
  passwd: guest
zookeeper:
  hosts:
    - host: zookeeper
      port: 2181
  options:
    timeout: 30000
    host_order_deterministic: false
    debug_level: 1
# application config
appConfig:
  process:
    acceptPort: 6001
    timeout:
      default: 3000
      assignGame: 5000
  master:
    maxGameAssignTime: 86400000
logger:
  appenders:
    access:
      type: console
      layout:
        type: basic
    out:
      type: console
      layout:
        type: basic
    error:
      type: console
      layout:
        type: basic
  categories:
    default:
      appenders:
        - out
      level: info
    access:
      appenders:
        - access
      level: info
    out:
      appenders:
        - out
      level: info
    error:
      appenders:
        - error
      level: info
