version: "3"

# content-storage 用 redis クラスター共通設定テンプレート
x-redis-content-storage-cluster-common: &redis-content-storage-cluster-common
  image: redis:7.4.7
  restart: always
  command: >
    sh -c '
      set -e
      exec redis-server \
        --port $${REDIS_PORT:-6379} \
        --cluster-enabled yes \
        --cluster-config-file nodes.conf \
        --cluster-node-timeout 5000 \
        --appendonly yes \
        --cluster-preferred-endpoint-type hostname \
        --cluster-announce-hostname $$REDIS_HOSTNAME \
        --cluster-announce-port $${REDIS_PORT:-6379}
        '
  healthcheck:
    test: ["CMD", "sh", "-c", "redis-cli -h localhost -p $${REDIS_PORT:-6379} ping"]
    interval: 5s
    timeout: 5s
    retries: 10

services:
  # マイグレーション用
  temp-db-setup:
    image: ghcr.io/akashic-games/akashic-system:latest
    working_dir: /home/akashic/app/
    restart: "no"
    environment:
      NODE_ENV: ""
      LANG: ja_JP.UTF8
    volumes:
      - "./database-all-in-one.json:/home/akashic/app/database.json:ro"
      - "./migrations/config/migrate-mongo-all-in-one-config.js:/home/akashic/app/migrations/config/migrate-mongo-config.js:ro"
    command: ["run", "db:migrate"]
    depends_on:
      database:
        condition: service_healthy
      mongodb:
        condition: service_healthy

  # redis セットアップ用
  temp-redis-setup:
    image: redis:7.4.7
    restart: "no"
    entrypoint:
      - "bash"
      - "/container-init.sh"
    volumes:
      - "./tools/all-in-one-redis-setup.sh:/container-init.sh:ro"
    depends_on:
      redis-content-storage-node-0:
        condition: service_healthy
      redis-content-storage-node-1:
        condition: service_healthy
      redis-content-storage-node-2:
        condition: service_healthy

  # コンテンツ配信用
  resource-server:
    image: nginx:1.29.4
    ports:
      - "2100:2100"
    volumes:
      - "./volumes/akashic-resources/contents:/usr/share/nginx/html/contents:ro"
      - "./volumes/akashic-resources/engines:/usr/share/nginx/html/engines:ro"
      - "./volumes/akashic-resources/games:/usr/share/nginx/html/games:ro"
      - "./config/resource-server/nginx.conf:/etc/nginx/conf.d/default.conf:ro"

  # akashic system
  akashic-cluster-master:
    image: ghcr.io/akashic-games/akashic-system:latest
    working_dir: /home/akashic/app/servers/akashic-cluster-master
    restart: always
    ports:
      - "127.0.0.1:13400:13400"
    environment:
      NODE_ENV: ""
      LANG: ja_JP.UTF8
    volumes:
      - "./volumes/akashic-cluster-master/static:/home/akashic/app/servers/akashic-cluster-master/static"
    depends_on:
      rabbitmq:
        condition: service_healthy
      zookeeper:
        condition: service_healthy
      temp-db-setup:
        condition: service_completed_successfully

  cluster-monitor:
    image: ghcr.io/akashic-games/akashic-system:latest
    working_dir: /home/akashic/app/servers/cluster-monitor
    restart: always
    ports:
      - "127.0.0.1:17000:17000"
    environment:
      NODE_ENV: ""
      LANG: ja_JP.UTF8
    depends_on:
      redis:
        condition: service_healthy
      zookeeper:
        condition: service_healthy
      cluster-monitor-api-server:
        condition: service_started
      system-api-server:
        condition: service_started
      temp-db-setup:
        condition: service_completed_successfully

  cluster-monitor-api-server:
    image: ghcr.io/akashic-games/akashic-system:latest
    working_dir: /home/akashic/app/servers/cluster-monitor-api-server
    restart: always
    ports:
      - "127.0.0.1:16000:16000"
    environment:
      NODE_ENV: ""
      LANG: ja_JP.UTF8
    depends_on:
      redis:
        condition: service_healthy
      zookeeper:
        condition: service_healthy
      temp-db-setup:
        condition: service_completed_successfully

  conduct-worker:
    image: ghcr.io/akashic-games/akashic-system:latest
    working_dir: /home/akashic/app/servers/conduct-worker
    restart: always
    environment:
      NODE_ENV: ""
      LANG: ja_JP.UTF8
    depends_on:
      rabbitmq:
        condition: service_healthy
      system-api-server:
        condition: service_started
      temp-db-setup:
        condition: service_completed_successfully

  playlog-server:
    image: ghcr.io/akashic-games/akashic-system:latest
    working_dir: /home/akashic/app/servers/playlog-server
    restart: always
    ports:
      - "4001:4001"
      - "127.0.0.1:4301:4301"
    environment:
      NODE_ENV: ""
      LANG: ja_JP.UTF8
    volumes:
      - "./logs/playlog-server:/var/log/akashic"
    depends_on:
      minio:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      zookeeper:
        condition: service_healthy
      system-api-server:
        condition: service_started
      temp-db-setup:
        condition: service_completed_successfully
    command:
      - start
      - "--"
      - "-d"
      - "-p"
      - "4001"
      - "--reservationPort"
      - "4301"
      - "-m"
      - "50"
      - "-i"
      - "akashic-system_playlog-server-01"
      - "-t"
      - "standard_websocket"
      - "-e"
      - "ws://playlog-server:4001"
      - "-s"
      - "http://playlog-server:4301"
      - "-c"
      - "dispatching_playlog-server_4001"
      - "-r"
      - "60000"

  system-api-server:
    image: ghcr.io/akashic-games/akashic-system:latest
    working_dir: /home/akashic/app/servers/system-api-server
    restart: always
    ports:
      - "127.0.0.1:3100:3100"
    environment:
      NODE_ENV: ""
      LANG: ja_JP.UTF8
    volumes:
      - "./volumes/system-api-server/static:/home/akashic/app/servers/system-api-server/static"
      - "./logs/system-api-server:/home/akashic/log"
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      zookeeper:
        condition: service_healthy
      temp-db-setup:
        condition: service_completed_successfully
      temp-redis-setup:
        condition: service_completed_successfully

  # game-runner2
  game-runner:
    image: ghcr.io/akashic-games/game-runner:latest
    platform: linux/amd64
    extra_hosts:
      - "localhost:host-gateway"
    volumes:
      - "./config/game-runner/default.json:/home/akashic/game-runner/config.json:ro"
      - "./volumes/akashic-resources/engines:/data/engines/:ro"
      - "./volumes/akashic-resources/contents:/data/contents/:ro"
    depends_on:
      minio:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      zookeeper:
        condition: service_healthy
      temp-db-setup:
        condition: service_completed_successfully
      temp-redis-setup:
        condition: service_completed_successfully

  # middlewares
  database:
    image: mysql:8.0.39
    restart: always
    ports:
      - "127.0.0.1:3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root-pw
      MYSQL_DATABASE: akashic
      MYSQL_USER: akashic
      MYSQL_PASSWORD: pw
    volumes:
      - database-volume:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.4.7
    restart: always
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # content-storage 用 redis 群

  redis-content-storage-node-0:
    <<: *redis-content-storage-cluster-common
    environment:
      REDIS_PORT: 6401
      REDIS_HOSTNAME: redis-content-storage-node-0
    ports:
      - "127.0.0.1:6401:6401"
    volumes:
      - redis-content-storage-node-0-volume:/data

  redis-content-storage-node-1:
    <<: *redis-content-storage-cluster-common
    environment:
      REDIS_HOSTNAME: redis-content-storage-node-1
    volumes:
      - redis-content-storage-node-1-volume:/data

  redis-content-storage-node-2:
    <<: *redis-content-storage-cluster-common
    environment:
      REDIS_HOSTNAME: redis-content-storage-node-2
    volumes:
      - redis-content-storage-node-2-volume:/data

  rabbitmq:
    image: rabbitmq:3.13.7-management
    restart: always
    ports:
      - "127.0.0.1:5671:5671"
      - "127.0.0.1:5672:5672"
      - "127.0.0.1:15672:15672"
      - "127.0.0.1:25672:25672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  ferretdb-postgres:
    image: ghcr.io/ferretdb/postgres-documentdb:17-0.107.0-ferretdb-2.7.0
    restart: always
    environment:
      - POSTGRES_USER=username
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=postgres
    volumes:
      - ferretdb-postgres-volume:/var/lib/postgresql/data
    # コンテナの起動チェック
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10

  mongodb:
    image: ghcr.io/ferretdb/ferretdb:2.7.0
    restart: always
    ports:
      - "127.0.0.1:27017:27017"
    environment:
      - FERRETDB_AUTH=false
      - FERRETDB_POSTGRESQL_URL=postgres://username:password@ferretdb-postgres:5432/postgres
      - FERRETDB_LOG_LEVEL=warn
    depends_on:
      ferretdb-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/ferretdb", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  zookeeper:
    image: zookeeper:3.5.10
    restart: always
    ports:
      - "127.0.0.1:2181:2181"
    environment:
      ZOO_4LW_COMMANDS_WHITELIST: ruok
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc 127.0.0.1 2181 | grep imok"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2024-08-03T04-33-23Z
    restart: always
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    environment:
      MINIO_ROOT_USER: hogehoge
      MINIO_ROOT_PASSWORD: hogehoge
    volumes:
      - /data
    command:
      - server
      - /data
      - --console-address
      - ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  ferretdb-postgres-volume:
  database-volume:
  redis-content-storage-node-0-volume:
  redis-content-storage-node-1-volume:
  redis-content-storage-node-2-volume:
